//give Kerbals a little more inventory volume and mass. I know that's not a tech tree thing but still.
@PART:HAS[#MODULE[KerbalEVA]]
{
	@MODULE[ModuleInventoryPart]
	{
		@massLimit = 0.106
		@packedVolumeLimit = 55
	}
}

!PART[LiquidEngineRE-J10]:NEEDS[ReStockPlus|!ChemicalPropulsion]{} //removes the Wolfhound, unless ChemicalPropulsion is installed.
@PART[restock-engine-schnauzer-1]:NEEDS[!ChemicalPropulsion]:AFTER[ReStockPlus]
{
	@MHReplacement = False //adds back the Restock version of the Wolfhound, the Schnauzer.
}

//add some nice to have parts to the early tech tree.
@PART[sepMotor1]:FOR[zAlternisTechTree]
{
	@TechRequired = start
}
@PART[probeCoreSphere_v2]:FOR[zAlternisTechTree]
{
	@TechRequired = start
}

//Put all but longest 1.25m fuel tanks into basicRocketry
@PART[fuelTank]:FOR[zAlternisTechTree]:NEEDS[!AlcoholicAeronautics]
{
	@TechRequired = basicRocketry
}
@PART[fuelTankSmall]:FOR[zAlternisTechTree]:NEEDS[!AlcoholicAeronautics]
{
	@TechRequired = basicRocketry
}

//When AlcoholicAeronautics is installed, put the 1.25m tanks in Start.
@PART[fuelTank]:FOR[zAlternisTechTree]:NEEDS[AlcoholicAeronautics]
{
	@TechRequired = start
}
@PART[fuelTankSmall]:FOR[zAlternisTechTree]:NEEDS[AlcoholicAeronautics]
{
	@TechRequired = start
}
//when AlcoholicAeronautics is installed put tall 1.25m fuel tank into basicRocketry.
@PART[fuelTank_long]:FOR[zAlternisTechTree]:NEEDS[AlcoholicAeronautics]
{
	@TechRequired = basicRocketry
}

//Swap LV-T30 and LV-T45.
@PART[liquidEngine_v2]:FOR[AlternisTechTree]:NEEDS[!AlcoholicAeronautics]
{
	@TechRequired = basicRocketry
}
@PART[liquidEngine2_v2]:FOR[AlternisTechTree]:NEEDS[!AlcoholicAeronautics]
{
	@TechRequired = generalRocketry
}

//put tall 1.25m fuel tank into generalRocketry.
@PART[fuelTank_long]:FOR[zAlternisTechTree]:NEEDS[!AlcoholicAeronautics]
{
	@TechRequired = generalRocketry
}

//put all 1.875m fuel tanks into advanced rocketry.
@PART[Size1p5_Tank_01]:FOR[zAlternisTechTree]
{
	@TechRequired = advRocketry
}
@PART[Size1p5_Tank_02]:FOR[zAlternisTechTree]
{
	@TechRequired = advRocketry
}
@PART[Size1p5_Tank_03]:FOR[zAlternisTechTree]
{
	@TechRequired = advRocketry
}
@PART[Size1p5_Tank_04]:FOR[zAlternisTechTree]
{
	@TechRequired = advRocketry
}
@PART[Size1p5_Tank_05]:FOR[zAlternisTechTree]
{
	@TechRequired = advRocketry
}

//put the 2.5m long fuel tank into Fuel Systems with the other 2.5m tanks.
@PART[Rockomax64_BW]:FOR[zAlternisTechTree]
{
	@TechRequired = fuelSystems
}

//put the 3.75m long fuel tank into largeVolumeContainment with the other 3.75m tanks. 
@PART[Size3LargeTank]:FOR[zAlternisTechTree]
{
	@TechRequired = largeVolumeContainment
}

//Make the 1.875m service bay unlock with the shitty MH 0.625-1.25m and 1.875m service modules.
@PART[restock-service-bay-1875-1]
{
	@TechRequired = advConstruction
}

