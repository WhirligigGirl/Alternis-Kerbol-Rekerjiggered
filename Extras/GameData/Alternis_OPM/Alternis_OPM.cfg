@Kopernicus:AFTER[OPM]
{
	//nearly KSP-scale Jupiter mass.
	@Body[Sarnus]
	{
		@Properties
		{
			@radius = 6700000
            @geeASL = 1.89
		}
	}
	//Move Hale and Ovok out to accomodate larger planet and rings--rings in Kopernicus are defined relative to the planet's diameter.
	@Body[Hale]
	{
		@Orbit
		{
			@semiMajorAxis *= 1.26415094
		}
	}
	@Body[Ovok]
	{
		@Orbit
		{
			@semiMajorAxis *= 1.26415094
		}
	}
	//KSP scale Uranus
	@Body[Urlum]
	{
		@Properties
		{
			@radius = 2500000
			@geeASL = 0.886
		}
		!Rings{} //remove rings.
	}
	//Move Urlum's inner moons out slightly so they avoid the rings.
	@Body[Polta]
	{
		@Orbit
		{
			@semiMajorAxis *= 1.14836932
		}
	}
	@Body[Priax]
	{
		@Orbit
		{
			@semiMajorAxis *= 1.14836932
		}
	}
	
	//Move Plock and AKR_Eeloo to be trans-Urlumian objects rather than trans-Neidonian.
	@Body[Plock]
	{
		@Orbit
		{
			@semiMajorAxis *= 0.621262458
		}
	}
	@Body:HAS[#identifier[AKR/Eeloo]]
	{
		@Orbit
		{
			@semiMajorAxis *= 0.621262458
		}
	}
	
	//move Wal to orbit Tylo.
	@Body[Wal]
	{
		@Properties
		{
			@radius = 270000
			@geeASL = 0.27
		}
		@Orbit
		{
			@referenceBody = AKR/Tylo
			@semiMajorAxis = 52917632
		}
	}
	@Body[Tal]
	{
		@Properties
		{
			@description = Tal is, like Bop, a sub-satellite. While generally these moons of moons are impossible due to too small spheres of influence, Wal's distant orbit from Tylo allowed Tal to maintain a stable orbit. Tal's albedo indicates it is composed of metals, ice or both.
		}
		@Orbit
		{
			@semiMajorAxis *= 0.55
		}
	}
	//Move Neidon's moons to orbit Urlum.
	@Body[Thatmo]
	{
		@Orbit
		{
			@referenceBody = Urlum
		}
	}
	@Body[Nissee]
	{
		@Orbit
		{
			@referenceBody = Urlum
			@semiMajorAxis *= 0.6
		}
	}
	
	//Make Slate much smaller. It lost its atmosphere due to being too small to maintain one.
	@Body[Slate]
	{
		@Properties
		{
			@description = Slate's yellow and brown colors have inspired many painters since its discovery, including the renowned Vincent Van Kerman.
			@radius = 160000
			@geeASL = 0.13
		}
		@PQS
		{
			@Mods
            {
				@VertexHeightMap
				{
					@deformity *= 0.3
				}
				@VertexSimplexHeightAbsolute
				{
					@deformity *= 0.3
				}				
				@VertexSimplexHeight
				{
					@deformity *= 0.3
				}		
				@VertexHeightNoiseVertHeightCurve2
				{
					@deformity *= 0.3
					@simplexHeightEnd *= 0.3
				}
				@VoronoiCraters
				{
					@deformation *= 0.3
				}
            }
		}
	}
	
	//Same characteristics as in OPM, but in a hot Neptune orbit.
	@Body[Neidon]
	{
		@Properties
		{
			@description = Neidon is a gaseous planet not unlike Jool, but much smaller and much closer to the Sun. Its purple color stands in stark contrast to the yellow of Eve.
			@radius = 2145000
			@geeASL = 0.314
			@albedo = 0.12
			@tidallyLocked = True
			@ScienceValues
			{
				@landedDataValue = 30
				@splashedDataValue = 1
				@flyingLowDataValue = 14
				@flyingHighDataValue = 11
				@inSpaceLowDataValue = 9
				@inSpaceHighDataValue = 8
				@recoveryValue = 8
			}
		}
		@ScaledVersion
		{
			!OnDemand{}
			@Material
			{
				texture = Alternis_OPM/Textures/Neidon_Color
			}
		}
		@Orbit
		{
			@semiMajorAxis = 1.35984464e9 //about 1/110th of an au.
		}
		@Atmosphere
		{
			@enabled =	True			
			@oxygen =	False			
			@altitude =	1390000			
			@adiabaticIndex =	1.66			
			@atmosphereMolarMass =	0.00173			
			@temperatureSeaLevel =	907			
			@staticPressureASL =	607.95
			!temperatureCurve{}
			temperatureCurve				
			{				
				key =	0	900	0.00000E+00	-4.30000E-03
				key =	10000	857	-4.30000E-03	0.00000E+00
				key =	20000	857	0.00000E+00	0.00000E+00
				key =	30000	857	0.00000E+00	0.00000E+00
