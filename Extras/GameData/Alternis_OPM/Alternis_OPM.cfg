				key =	65000	857	0.00000E+00	-2.38000E-02
				key =	80000	500	-2.38000E-02	-2.83286E-04
				key =	1139000	200	-2.83286E-04	-7.99680E-05
				key =	3640000		-7.99680E-05	0.00000E+00
			}
			!temperatureSunMultCurve{}
			temperatureSunMultCurve				
			{				
				key =	0	1	0.00000E+00	-6.00000E-05
				key =	20000	-0.2	-6.00000E-05	1.33333E-05
				key =	50000	0.2	1.33333E-05	0.00000E+00
				key =	65000	0.2	0.00000E+00	0.00000E+00
			}			
			!temperatureLatitudeBiasCurve{}
			temperatureLatitudeBiasCurve				
			{				
				key =	0	2.12	0	0
				key =	38	0	-0.1075	-0.1075
