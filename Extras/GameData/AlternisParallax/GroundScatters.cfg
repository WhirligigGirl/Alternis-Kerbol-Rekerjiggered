@Kopernicus:AFTER[AlternisKerbol]
{
	@Body:HAS[#identifier[AKR/Laythe]]
	{
		@PQS
		{
			@Mods
			{
				@LandControl
				{
					%createScatter = False
				}
			}
		}
	}
	@Body:HAS[#identifier[AKR/Kerbin]]
	{
		@PQS
		{
			@Mods
			{
				LandControl
				{
					createScatter = False
				}
			}
		}
	}
	@Body:HAS[#identifier[AKR/Tylo]]
	{
		@PQS
		{
			@Mods
			{
				@LandControl
				{
					%createScatter = False
				}
			}
		}
	}
}