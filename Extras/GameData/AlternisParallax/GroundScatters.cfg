//Break things on purpose if StockPlanetTextures is installed.
@Kopernicus:NEEDS[Parallax_StockPlanetTextures]
{
	@Body[Kerbin]
	{
		@Orbit
		{
			%referenceBody = BreakTheSystemOnPurpose
		}
	}
}
