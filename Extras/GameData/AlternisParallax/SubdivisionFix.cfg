@Kopernicus:FOR[zAlternisParallax]:NEEDS[ParallaxContinued]
{
	Preset
	{
		name = AlternisParallax
		displayName = AlternisParallax
		PLANET
		{
			name = Minmus
			minSubdivision = 2
			maxSubdivision = 7
		}
		PLANET
		{
			name = Bop
			minSubdivision = 2
			maxSubdivision = 5
		}
		PLANET
		{
			name = Ike
			minSubdivision = 2
			maxSubdivision = 5
		}
		PLANET
		{
			name = Tylo
			minSubdivision = 2
			maxSubdivision = 12
		}
		PLANET
		{
			name = Laythe
			minSubdivision = 2
			maxSubdivision = 11
		}
		PLANET
		{
			name = Kerbin
			minSubdivision = 2
			maxSubdivision = 11
		}
	}
}
@Kopernicus:FOR[zAlternisParallax]:NEEDS[ParallaxContinued]
{
	@Body[Bop]
	{
		@PQS
		{
			// @maxLevel = 5
			@Mods
			{
				@Parallax
				{
					@subdivisionLevel = 5
					@subdivisionRadius = 350
				}
			}
		}
	}
	@Body[Kerbin]
	{
		@PQS
		{
			// @maxLevel = 5
			@Mods
			{
				@Parallax
				{
					@subdivisionLevel = 6
					@subdivisionRadius = 500
				}
			}
		}
	}
	@Body[Vall]
	{
		@PQS
		{
			@Mods
			{
				!VertexHeightNoiseVertHeightCurve2:HAS[#name[HeightNoise1]]{}
				!VertexRidgedAltitudeCurve:HAS[#name[HeightNoise]]{}
			}
		}
	}
	@Body[Ike]
	{
		@PQS
		{
			// @maxLevel = 5
			@Mods
			{
				@Parallax
				{
					@subdivisionLevel = 5
					@subdivisionRadius = 350
				}
			}
		}
	}
	@Body[Minmus]
	{
		@PQS
		{
			// @maxLevel = 7
			@Mods
			{
				@Parallax
				{
					@subdivisionLevel = 5
					@subdivisionRadius = 350
				}
			}
		}
	}
	@Body[Tylo]
	{
		@PQS
		{
			// @maxLevel = 11
			@Mods
			{
				@Parallax
				{
					@subdivisionLevel = 8
					@subdivisionRadius = 1100
				}
			}
		}
	}
}