@Kopernicus:AFTER[AlternisKerbol]:NEEDS[OPM,!InterstellarConsortium,!GalacticNeighborhood]
{
	@Body:HAS[#identifier[AKR/Eeloo]]
	{
		@Orbit
		{
			//Change semiMajorAxis to put it in the scattered disk.
			%referenceBody = Sun
			%semiMajorAxis = 10166.0e8
			%inclination = 2.3
			%eccentricity = 0.12
			%longitudeOfAscendingNode = 35.9
		}
	}
}
@Kopernicus:BEFORE[OPM]:NEEDS[OPM,!InterstellarConsortium,!GalacticNeighborhood]
{
    @Body:HAS[#identifier[AKR/Eeloo]]
	{
		@name = AKR_Eeloo
	}
	//Delete Eeloo
    !Body[Eeloo] {}
    //Restore Eeloo's template.
	Body
    {
        name = Eeloo
        Orbit
        {
            referenceBody = Sun
        }
        Template
        {
            name = Eeloo
            removeProgressTree = false
        }
        Properties
        {
			ScienceValues
            {
 
            }
        }
        ScaledVersion
        {
 
        }
        PQS
        {
       
        }
    }
}
@Kopernicus:AFTER[OPM]
{
	@Body[Eeloo]
	{
		@Properties
		{
			displayName = Eilu^N
			@description = Eilu, named for a giant Kerbal mythological figure the size of at least 1.8 Kerbals, shares a name with Eeloo. This historical oddity can be explained by the two bodies having been discovered by astronomers on opposite sides of Kerbin. When they heard tell that the other astronomer had stolen their discovery's name, they arranged to have a duel to determine which celestial body would keep its name. Unfortunately due to the nature of sea travel at the time, neither astronomer survived the journey, and the duel was considered a draw. The surface of Eilu is covered in brown scratches, which could be the result of cryovolcanic activity. This might mean that the moons harbors a liquid ocean beneath its frozen crust.
		}
	}
	@Body:HAS[#identifier[AKR/Eeloo]]
	{
		@Properties
		{
			%description = Eeloo is the most distant planet in the solar system. Likely made of ice and rock, the planet has had no atmosphere yet detected, but it does have one decent-sized moon. \n\nSpaceflight engineers have proposed the use of atomic energies such as fission to generate power so far away from the sun. Underneath the icy crust of Eeloo may be a vast ocean of liquid water, making it the third most potentially habitable planet or moon in the solar system.
		}
	}
}